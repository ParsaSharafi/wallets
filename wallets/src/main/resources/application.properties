spring.application.name=wallets
#server.port=8081

spring.datasource.url=${WALLETS_DB_URL}
#spring.datasource.url=jdbc:postgresql://localhost:5431/wallets
spring.datasource.username=${WALLETS_DB_USERNAME}
#spring.datasource.username=parsa
spring.datasource.password=${WALLETS_DB_PASSWORD}
#spring.datasource.password=123

spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=true

fee.exchange=${EXCHANGE_FEE}
#fee.exchange=0.05
fee.transfer=${TRANSFER_FEE}
#fee.transfer=0.03

spring.kafka.consumer.bootstrap-servers=${BOOTSTRAP_SERVERS}
#spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=exchangeRate
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=sharafi.model.Currency
spring.kafka.consumer.properties.spring.json.trusted.packages=sharafi.ExchangeRateUpdater

payment.gateway.url=${GATEWAY_BASE_URL}
#payment.gateway.url=http://localhost:8082

send.pending.cron=0 * * * * *
send.pending.minutes.old=5